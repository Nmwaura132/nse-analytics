services:
  postgres:
    image: 'postgres:16-alpine'
    restart: unless-stopped
    environment:
      POSTGRES_DB: '${POSTGRES_DB:-nse_db}'
      POSTGRES_USER: '${POSTGRES_USER:-nse_user}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - '/opt/nse-pro/postgres-data:/var/lib/postgresql/data'
    networks:
      default:
        aliases:
          - nse-postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nse_user} -d ${POSTGRES_DB:-nse_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-gateway:
    image: '${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}'
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: '${OPENCLAW_GATEWAY_TOKEN:-}'
      TZ: '${OPENCLAW_TZ:-Africa/Nairobi}'
      DEEPSEEK_API_KEY: '${DEEPSEEK_API_KEY:-}'
    volumes:
      - '/opt/nse-pro/openclaw-data:/home/node/.openclaw'
      - '/opt/nse-pro/openclaw-workspace:/home/node/.openclaw/workspace'
    ports:
      - '${OPENCLAW_GATEWAY_PORT:-18789}:18789'
      - '${OPENCLAW_BRIDGE_PORT:-18790}:18790'
    init: true
    restart: unless-stopped
    command:
      - node
      - dist/index.js
      - gateway
      - '--bind'
      - lan
      - '--port'
      - '18789'
      - '--allow-unconfigured'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  hermes-agent:
    image: 'nousresearch/hermes-agent:latest'
    restart: unless-stopped
    environment:
      HERMES_HOME: /opt/data
      HERMES_ACCEPT_HOOKS: '1'
    volumes:
      - '/opt/nse-pro/hermes-data:/opt/data'
    command:
      - hermes
      - gateway
      - run
      - '--accept-hooks'
      - '--replace'
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "hermes gateway" > /dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nse-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    networks:
      - default
      - coolify
    ports:
      - '5001:80'
    depends_on:
      nse-api:
        condition: service_started
    restart: unless-stopped
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.nse-dashboard.rule=Host(`nse.37.221.93.219.sslip.io`)'
      - 'traefik.http.routers.nse-dashboard.entrypoints=https'
      - 'traefik.http.routers.nse-dashboard.tls=true'
      - 'traefik.http.routers.nse-dashboard.tls.certresolver=letsencrypt'
      - 'traefik.http.services.nse-dashboard.loadbalancer.server.port=80'
      - 'traefik.http.routers.nse-dashboard-http.rule=Host(`nse.37.221.93.219.sslip.io`)'
      - 'traefik.http.routers.nse-dashboard-http.entrypoints=http'
      - 'traefik.http.routers.nse-dashboard-http.middlewares=redirect-https@docker'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nse-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: nse-postgres
      DB_PORT: '5432'
      DB_NAME: '${POSTGRES_DB:-nse_db}'
      DB_USER: '${POSTGRES_USER:-nse_user}'
      DB_PASSWORD: '${POSTGRES_PASSWORD}'
      PYTHONPATH: /app/nse_backend
      ALLOWED_HOSTS: '${ALLOWED_HOSTS:-localhost,127.0.0.1}'
    networks:
      - default
      - coolify
    ports:
      - '8001:8000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        cd /app/nse_backend &&
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application -w 6 -b 0.0.0.0:8000
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.nse-api.rule=Host(`api.37.221.93.219.sslip.io`)'
      - 'traefik.http.routers.nse-api.entrypoints=https'
      - 'traefik.http.routers.nse-api.tls=true'
      - 'traefik.http.routers.nse-api.tls.certresolver=letsencrypt'
      - 'traefik.http.services.nse-api.loadbalancer.server.port=8000'
      - 'traefik.http.routers.nse-api-http.rule=Host(`api.37.221.93.219.sslip.io`)'
      - 'traefik.http.routers.nse-api-http.entrypoints=http'
      - 'traefik.http.routers.nse-api-http.middlewares=redirect-https@docker'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/stocks']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nse-bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      OPENCLAW_API_URL: 'http://openclaw-gateway:18789'
      HERMES_API_URL: 'http://hermes-agent:8642'
      DATABASE_URL: 'postgresql://${POSTGRES_USER:-nse_user}:${POSTGRES_PASSWORD}@nse-postgres:5432/${POSTGRES_DB:-nse_db}'
      BACKEND_URL: 'http://nse-api:8000/api'
    volumes:
      - '/opt/nse-pro/bot.log:/app/bot.log'
      - '/opt/nse-pro/ml-models:/app/models'
    restart: unless-stopped
    command:
      - python
      - nse_bot.py
    depends_on:
      postgres:
        condition: service_healthy
      nse-dashboard:
        condition: service_started
      nse-api:
        condition: service_started

networks:
  coolify:
    external: true
